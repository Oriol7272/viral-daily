<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Daily</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .platform {
            margin: 20px 0;
        }
        .platform h2 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .video {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .video img {
            max-width: 100%;
            border-radius: 5px;
        }
        .video a {
            text-decoration: none;
            color: #0066cc;
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }
        .video a:hover {
            color: #003366;
        }
        .filter {
            text-align: center;
            margin: 20px 0;
        }
        .filter button {
            padding: 10px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 5px;
            background-color: #0066cc;
            color: white;
            cursor: pointer;
        }
        .filter button:hover {
            background-color: #003366;
        }
        .filter button.active {
            background-color: #003366;
        }
        #video-chart {
            max-width: 600px;
            margin: 20px auto;
        }
        .search {
            text-align: center;
            margin: 10px 0;
        }
        .search input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Viral Daily</h1>

    <div class="search">
        <input type="text" id="search-input" placeholder="Buscar videos...">
    </div>

    <div class="filter">
        <button class="platform-filter active" data-platform="all">Todos</button>
        <button class="platform-filter" data-platform="youtube">YouTube</button>
        <button class="platform-filter" data-platform="tiktok">TikTok</button>
    </div>

    <canvas id="video-chart"></canvas>

    <section class="platform" id="youtube">
        <h2>🎥 YouTube</h2>
        <div class="video-grid" id="youtube-videos">
            <!-- Videos cargados dinámicamente desde la API -->
        </div>
    </section>

    <section class="platform" id="tiktok">
        <h2>🎵 TikTok</h2>
        <div class="video-grid" id="tiktok-videos">
            <!-- Videos cargados dinámicamente desde videos.json -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
